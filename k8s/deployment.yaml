apiVersion: v1
kind: Service
metadata:
  name: autocloud-api
  namespace: autocloud
spec:
  type: NodePort
  selector:
    app: autocloud
    tier: api
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autocloud-api
  namespace: autocloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autocloud
      tier: api
  template:
    metadata:
      labels:
        app: autocloud
        tier: api
    spec:
      containers:
      - name: autocloud
        image: autocloud:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: autocloud-config
        - secretRef:
            name: autocloud-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"