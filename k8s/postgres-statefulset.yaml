apiVersion: v1
kind: Service
metadata:
  name: autocloud-postgres
  namespace: autocloud
spec:
  selector:
    app: autocloud
    tier: postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: autocloud-postgres
  namespace: autocloud
spec:
  serviceName: autocloud-postgres
  replicas: 1
  selector:
    matchLabels:
      app: autocloud
      tier: postgres
  template:
    metadata:
      labels:
        app: autocloud
        tier: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: autocloud
        - name: POSTGRES_USER
          value: autocloud
        - name: POSTGRES_PASSWORD
          value: autocloud123
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi